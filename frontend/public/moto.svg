<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 140">
  <!-- Soft shadow -->
  <rect x="25" y="15" width="20" height="110" rx="10" fill="rgba(0,0,0,0.5)" filter="blur(3px)"/>
  
  <defs>
    <linearGradient id="motoGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="50%" stop-color="#ff7b85"/>
      <stop offset="100%" stop-color="#a80915"/>
    </linearGradient>
    <linearGradient id="seatGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#212529"/>
      <stop offset="50%" stop-color="#495057"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
  </defs>

  <!-- Front wheel -->
  <rect x="26" y="10" width="8" height="25" rx="4" fill="#111"/>
  <rect x="28" y="10" width="4" height="25" rx="2" fill="#333"/>

  <!-- Rear wheel -->
  <rect x="26" y="105" width="8" height="25" rx="4" fill="#111"/>
  
  <!-- Frame/Engine area -->
  <rect x="22" y="30" width="16" height="80" rx="6" fill="#343a40"/>
  
  <!-- Fuel Tank with 3D gradient -->
  <rect x="18" y="45" width="24" height="30" rx="10" fill="url(#motoGrad)"/>
  <!-- Tank highlight -->
  <ellipse cx="30" cy="55" rx="5" ry="8" fill="rgba(255,255,255,0.4)"/>
  
  <!-- Seat with 3D gradient -->
  <rect x="22" y="75" width="16" height="30" rx="5" fill="url(#seatGrad)"/>
  
  <!-- Handlebars -->
  <rect x="8" y="38" width="44" height="4" rx="2" fill="#adb5bd"/>
  <circle cx="8" cy="40" r="4" fill="#212529"/>
  <circle cx="52" cy="40" r="4" fill="#212529"/>
  
  <!-- Headlight glow -->
  <circle cx="30" cy="15" r="5" fill="#fff" filter="drop-shadow(0px -4px 6px #ffd166)"/>
  
  <!-- Taillight -->
  <rect x="25" y="125" width="10" height="4" rx="2" fill="#ff0000" filter="drop-shadow(0px 2px 4px #ff0000)"/>
</svg>
